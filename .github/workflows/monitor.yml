name: Polymarket Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: polymarket-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Create runtime dirs
        run: mkdir -p data outputs

      - name: Restore snapshot DB
        uses: actions/cache@v4
        with:
          path: data/snapshots.db
          key: snapshots-db-${{ github.run_id }}
          restore-keys: |
            snapshots-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRICE_CHANGE_THRESHOLD: '0.10'
          MIN_LIQUIDITY: '10000'
          TOP_N_MARKETS: '20'
          ALERT_COOLDOWN_HOURS: '2'
          MIN_TRADE_SIZE: '50000'
        run: python scripts/monitor.py --once
